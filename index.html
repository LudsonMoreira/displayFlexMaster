<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Flex</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }

        .container{
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #ababab;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            position: relative;
            width: 20%;
            height: 20%;
            background-color: #222222;
            border: 10px solid #ffffff;
            color: #ffffff;
            border-radius: 10px;
            margin: 1em;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box img{
            position: relative;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="box"><img src="img/img1.jpg" /></div>
        <div class="box"><img src="img/img2.jpg" /></div>
        <div class="box"><img src="img/img3.jpg" /></div>
    </main>
</body>
</html>
